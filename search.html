<div class="ns-search">
    <input id="ns-search-input" type="text" placeholder="Search products…" class="ns-search-input">
</div>

<div id="ns-search-results" class="ns-product-grid"></div>

<script src="/assets/js/search.js"></script>
<script>
    const input = document.getElementById('ns-search-input');

    input.addEventListener('input', () => {
        const query = input.value;
        const results = nsSearch(query);
        nsRenderSearchResults('#ns-search-results', results);
    });
</script>
